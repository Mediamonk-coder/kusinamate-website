<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Kusinamate</title>
  <meta name="description" content="Easy Filipino recipes made with Kusinamate coating sauces. Isang buhos, done na!">
  <link rel="canonical" href="https://kusinamate.com/recipe.html">

  <!-- Open Graph (dynamically updated by JS) -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="Recipe — Kusinamate">
  <meta property="og:description" content="Easy Filipino recipes made with Kusinamate coating sauces.">
  <meta property="og:image" content="https://kusinamate.com/assets/hero-lifestyle.png">
  <meta property="og:url" content="https://kusinamate.com/recipe.html">
  <meta property="og:site_name" content="Kusinamate">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recipe — Kusinamate">
  <meta name="twitter:description" content="Easy Filipino recipes made with Kusinamate coating sauces.">
  <meta name="twitter:image" content="https://kusinamate.com/assets/hero-lifestyle.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF6B35;
      --yellow: #F7C948;
      --charcoal: #2D3436;
      --cream: #FFF8F0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.6;
    }
    .back-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,248,240,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(45,52,54,0.08);
      padding: 0 24px;
    }
    .back-nav-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .back-nav a {
      text-decoration: none; color: var(--charcoal); font-weight: 700; font-size: 0.9rem;
    }
    .back-nav a:hover { color: var(--coral); }
    .back-nav .logo { height: 100px; margin: -20px 0; }

    .recipe-hero {
      width: 100%; aspect-ratio: 16/7; object-fit: cover;
      margin-top: 64px;
    }
    .recipe-container {
      max-width: 900px; margin: 0 auto; padding: 48px 24px 80px;
    }
    .recipe-tag {
      display: inline-block; padding: 4px 14px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 12px;
    }
    .recipe-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900;
      line-height: 1.2; margin-bottom: 8px;
    }
    .recipe-sauce {
      color: var(--coral); font-weight: 800; font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .recipe-desc {
      font-size: 1.1rem; color: #555; max-width: 700px;
      margin-bottom: 28px; line-height: 1.7;
    }
    .recipe-meta {
      display: flex; gap: 24px; margin-bottom: 40px; flex-wrap: wrap;
    }
    .meta-item {
      text-align: center; padding: 16px 24px;
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .meta-item .value { font-size: 1.3rem; font-weight: 900; color: var(--coral); }
    .meta-item .label { font-size: 0.75rem; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    .recipe-section { margin-bottom: 36px; }
    .recipe-section h2 {
      font-size: 1.3rem; font-weight: 900; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 3px solid var(--coral);
      display: inline-block;
    }
    .ingredients-list, .steps-list { padding-left: 24px; }
    .ingredients-list li, .steps-list li {
      font-size: 1.05rem; margin-bottom: 10px; line-height: 1.6;
    }
    .steps-list li { margin-bottom: 16px; }
    .steps-list li::marker { color: var(--coral); font-weight: 900; }

    .cta-box {
      background: linear-gradient(135deg, var(--coral), #E8752A);
      border-radius: 16px; padding: 32px; text-align: center; color: white;
    }
    .cta-box h3 { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
    .cta-box p { font-size: 0.95rem; opacity: 0.9; margin-bottom: 16px; }
    .cta-box a {
      display: inline-block; background: white; color: var(--coral);
      padding: 12px 28px; border-radius: 30px; font-weight: 800;
      text-decoration: none; transition: transform 0.2s;
    }
    .cta-box a:hover { transform: scale(1.05); }

    #loading { text-align: center; padding: 100px 24px; color: #999; margin-top: 64px; }
    #recipeContent { display: none; }

    @media (max-width: 600px) {
      .recipe-meta { gap: 12px; }
      .meta-item { flex: 1; min-width: 80px; padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <nav class="back-nav">
    <div class="back-nav-inner">
      <a href="index.html">← Back to Kusinamate</a>
      <a href="index.html"><picture><source srcset="assets/logo.webp" type="image/webp"><img src="assets/logo.png" alt="Kusinamate" class="logo"></picture></a>
    </div>
  </nav>

  <div id="loading">Loading recipe...</div>

  <div id="recipeContent">
    <img id="heroImg" class="recipe-hero" src="" alt="" loading="lazy">
    <div class="recipe-container">
      <span id="tagEl" class="recipe-tag"></span>
      <h1 id="titleEl" class="recipe-title"></h1>
      <div id="sauceEl" class="recipe-sauce"></div>
      <p id="descEl" class="recipe-desc"></p>

      <div class="recipe-meta">
        <div class="meta-item"><div id="prepEl" class="value"></div><div class="label">Prep Time</div></div>
        <div class="meta-item"><div id="cookEl" class="value"></div><div class="label">Cook Time</div></div>
        <div class="meta-item"><div id="servingsEl" class="value"></div><div class="label">Servings</div></div>
      </div>

      <div class="recipe-section">
        <h2>Ingredients</h2>
        <ul id="ingredientsList" class="ingredients-list"></ul>
      </div>

      <div class="recipe-section">
        <h2>Steps</h2>
        <ol id="stepsList" class="steps-list"></ol>
      </div>

      <div class="cta-box">
        <h3>Try this with Kusinamate <span id="ctaSauce"></span>!</h3>
        <p>Isang buhos lang — from sawa to wow!</p>
        <a href="index.html#products">Explore Our Sauces</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mzjaqjxdisxrnxgqpxpo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16amFxanhkaXN4cm54Z3FweHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY1MTkzMTQsImV4cCI6MjA2MjA5NTMxNH0.z9Wy0-tsaMlkS1UJbOGSXkVaqKh59iGm-qucL1uHnDU';

    const params = new URLSearchParams(window.location.search);
    const recipeId = params.get('id');

    (async () => {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/recipes?id=eq.${encodeURIComponent(recipeId)}&select=*`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );
        const data = await res.json();
        const recipe = data[0];

        if (!recipe) {
          document.getElementById('loading').textContent = 'Recipe not found.';
          return;
        }

        document.title = recipe.title + ' — Kusinamate Recipe';

        // Update OG tags dynamically for social sharing crawlers that execute JS
        document.querySelector('meta[property="og:title"]').content = recipe.title + ' — Kusinamate Recipe';
        document.querySelector('meta[property="og:description"]').content = recipe.description;
        document.querySelector('meta[name="description"]').content = recipe.description;
        document.querySelector('meta[name="twitter:title"]').content = recipe.title + ' — Kusinamate Recipe';
        document.querySelector('meta[name="twitter:description"]').content = recipe.description;
        if (recipe.image) {
          document.querySelector('meta[property="og:image"]').content = recipe.image;
          document.querySelector('meta[name="twitter:image"]').content = recipe.image;
        }

        // Add Recipe structured data (JSON-LD)
        const jsonLd = {
          "@context": "https://schema.org",
          "@type": "Recipe",
          "name": recipe.title,
          "description": recipe.description,
          "image": recipe.image || '',
          "prepTime": recipe.prep_time,
          "cookTime": recipe.cook_time,
          "recipeYield": recipe.servings + ' servings',
          "recipeIngredient": recipe.ingredients || [],
          "recipeInstructions": (recipe.instructions || []).map((step, i) => ({
            "@type": "HowToStep",
            "position": i + 1,
            "text": step
          })),
          "author": { "@type": "Organization", "name": "Kusinamate" }
        };
        const scriptEl = document.createElement('script');
        scriptEl.type = 'application/ld+json';
        scriptEl.textContent = JSON.stringify(jsonLd);
        document.head.appendChild(scriptEl);

        const hero = document.getElementById('heroImg');
        if (recipe.image) {
          hero.src = recipe.image.startsWith('assets/') ? recipe.image.replace('.png', '.webp') : recipe.image;
          hero.alt = recipe.title;
        } else {
          hero.style.display = 'none';
        }

        const tagColor = recipe.tag_color || '#D4380D';
        document.getElementById('tagEl').textContent = recipe.tag;
        document.getElementById('tagEl').style.background = tagColor + '18';
        document.getElementById('tagEl').style.color = tagColor;
        document.getElementById('titleEl').textContent = recipe.title;
        document.getElementById('sauceEl').textContent = 'Made with Kusinamate ' + recipe.sauce;
        document.getElementById('descEl').textContent = recipe.description;
        document.getElementById('prepEl').textContent = recipe.prep_time;
        document.getElementById('cookEl').textContent = recipe.cook_time;
        document.getElementById('servingsEl').textContent = recipe.servings;
        document.getElementById('ctaSauce').textContent = recipe.sauce;

        const ingredients = recipe.ingredients || [];
        const ingList = document.getElementById('ingredientsList');
        ingredients.forEach(ing => {
          const li = document.createElement('li');
          li.textContent = ing;
          ingList.appendChild(li);
        });

        const steps = recipe.instructions || [];
        const stepsList = document.getElementById('stepsList');
        steps.forEach(step => {
          const li = document.createElement('li');
          li.textContent = step;
          stepsList.appendChild(li);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('recipeContent').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').textContent = 'Could not load recipe.';
      }
    })();
  </script>
</body>
</html>
